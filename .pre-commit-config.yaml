repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.0.1
  hooks:
  - id: check-docstring-first
  - id: check-added-large-files
    args: ['--maxkb=1000']
  - id: check-merge-conflict
  - id: check-toml
  - id: check-yaml
  - id: debug-statements
  - id: end-of-file-fixer
  - id: trailing-whitespace
  - id: no-commit-to-branch
    args: [--branch, main]

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.3.0
  hooks:
  - id: ruff
    args: [--fix]
  - id: ruff-format

# clang-format pinned to the version used to normalize src/cpp so the hook
# does not re-churn committed code.
- repo: https://github.com/pre-commit/mirrors-clang-format
  rev: v22.1.5
  hooks:
  - id: clang-format
    files: ^src/cpp/.*\.(cpp|hpp)$

- repo: https://github.com/cpplint/cpplint
  rev: 2.0.2
  hooks:
  - id: cpplint
    files: ^src/cpp/.*\.(cpp|hpp)$
    args:
      - "--filter=-legal/copyright,-readability/casting,-whitespace/braces,\
-whitespace/indent,-build/include_subdir,-whitespace/line_length,\
-build/header_guard,-runtime/references,-build/include_order,-runtime/int"

- repo: https://github.com/jorisroovers/gitlint
  rev: v0.18.0
  hooks:
  - id: gitlint
  - id: gitlint-ci
