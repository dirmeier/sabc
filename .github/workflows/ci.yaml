name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  precommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - uses: pre-commit/action@v3.0.1

  build-test:
    runs-on: ${{ matrix.os }}
    # Linux MLX support is still maturing; don't fail the build on it yet.
    continue-on-error: ${{ contains(matrix.os, 'ubuntu') }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14         # Apple Silicon (Metal)
          - ubuntu-latest    # Linux x86_64
          - ubuntu-24.04-arm # Linux arm64
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-extras
      - run: uv run ruff check sabc examples
      - run: uv run pytest
